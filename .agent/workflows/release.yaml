id: release
description: Prepare and tag release with validation and notes
domain: agent
roles:
  - validator
  - releaser
steps:
  - id: ensure_clean
    skill: agent.run_script
    input: git status --porcelain
  - id: full_validation
    skill: agent.run_script
    input: cargo test
  - id: generate_changelog
    skill: agent.llm_subagent
    input: "releaser:::Generate concise changelog from recent commits and workflow summaries."
  - id: tag_release
    skill: agent.run_script
    input: git tag v0.1.0
  - id: commit_release_notes
    skill: agent.git_commit
    input: |
      chore(release): prepare v0.1.0

      - full validation executed
      - changelog generated
      - release tag created
  - id: summarize
    skill: demo.echo
    input: Release workflow completed.
