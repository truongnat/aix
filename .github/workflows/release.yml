name: Release

on:
  push:
    branches:
      - main

concurrency: release-${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect pending changesets
        id: pending_changesets
        shell: bash
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          pending=0
          for file in "${files[@]}"; do
            if [ "$(basename "$file")" != "README.md" ]; then
              pending=1
              break
            fi
          done
          echo "pending=$pending" >> "$GITHUB_OUTPUT"

      - name: Create release PR or publish
        if: steps.pending_changesets.outputs.pending != '1'
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version-packages
          commit: "chore: version packages"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip release PR automation when changesets are pending
        if: steps.pending_changesets.outputs.pending == '1'
        run: |
          echo "Pending changesets detected under .changeset/."
          echo "This repository does not allow GitHub Actions to create release PRs."
          echo "Maintainers must run npm run version-packages locally and push the version commit."
