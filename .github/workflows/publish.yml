name: Create GitHub Release from tag

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate pack contracts
        run: node bin/validate.js

      - name: Run tests
        run: npm test

      - name: Lint code
        run: npm run lint

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tag=v$TAG_VERSION"
            exit 1
          fi

      - name: Check whether npm version already exists
        id: npm_version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "npm version already published; skipping npm publish"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LICENSE
            README.md
          body: |
            # ai-engineering-harness v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/truongnat/ai-engineering-harness/blob/main/CHANGELOG.md) for release notes.

            npm publish is handled by the main-branch changesets release workflow.
            Package version: https://www.npmjs.com/package/ai-engineering-harness/v${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
