name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate pack contracts
        run: node validate.js

      - name: Run repository tests
        run: npm test

      - name: Run dogfood demo tests
        working-directory: examples/dogfood-tiny-node-api
        run: npm test
