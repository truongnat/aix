name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Validate pack contracts
        run: node bin/validate.js

      - name: Run repository tests
        run: npm test

      - name: Run eval regression
        run: node bin/aih.js eval run sample-bugfix --yes

      - name: Check lib coverage gate
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        run: npm run test:coverage

      - name: Smoke test install (dry-run)
        shell: bash
        run: |
          TARGET="${RUNNER_TEMP:-/tmp}/aih-smoke-install"
          mkdir -p "$TARGET"
          node bin/aih.js install --provider generic --yes --target "$TARGET" --dry-run

      - name: Run dogfood demo tests
        working-directory: examples/dogfood-tiny-node-api
        run: npm test
