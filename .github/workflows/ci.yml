name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/

      - name: Run tests
        run: npm test

      - name: Validate skills (frontmatter)
        run: node dist/tools.js validate-skills

      - name: Audit skill sections (strict)
        run: node dist/tools.js audit-skill-structure --strict

      - name: Validate skill quality (strict)
        run: node dist/tools.js validate-skill-quality --strict

      - name: Validate skill quality warnings
        run: node dist/tools.js validate-skill-quality --markdown
        continue-on-error: true

      - name: Validate workflows (strict)
        run: node dist/tools.js validate-workflows --strict

      - name: Eval skill routing (strict)
        run: node dist/tools.js eval-skill-routing --strict

      - name: Eval skill output format — heuristic (strict)
        run: node dist/tools.js eval-skill-output-format --strict

      - name: Build and verify knowledge base
        run: |
          node dist/tools.js build-kb
          node dist/tools.js verify-kb
