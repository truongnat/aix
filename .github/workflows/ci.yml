name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Validate pack contracts
        run: node bin/validate.js

      - name: Run repository tests
        run: npm test

      - name: Run eval regression
        run: node bin/aih.js eval run sample-bugfix --yes --no-llm-judge

      - name: Check lib coverage gate
        if: matrix.node-version == 20 && (matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest')
        run: npm run test:coverage

      - name: Smoke test install (dry-run)
        run: |
          node -e "const fs=require('node:fs'); const os=require('node:os'); const path=require('node:path'); const childProcess=require('node:child_process'); const target=path.join(process.env.RUNNER_TEMP || os.tmpdir(), 'aih-smoke-install'); fs.mkdirSync(target, { recursive: true }); const result=childProcess.spawnSync(process.execPath, ['bin/aih.js', 'install', '--provider', 'generic', '--yes', '--target', target, '--dry-run'], { stdio: 'inherit' }); process.exit(result.status ?? 1);"

      - name: Run dogfood demo tests
        working-directory: examples/dogfood-tiny-node-api
        run: npm test
