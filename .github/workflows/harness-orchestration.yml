name: Harness Orchestration

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Feature branch to orchestrate'
        required: true
        default: 'feature/harness'
      target_branch:
        description: 'Target branch for merge'
        required: true
        default: 'main'
      auto_merge:
        description: 'Auto-merge if all gates pass'
        type: boolean
        required: true
        default: false
  push:
    branches:
      - 'harness/**'
      - 'feature/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # P1 + P2: Context + Constraints
  harness-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      eval_pass: ${{ steps.eval.outputs.pass }}
      constraints_pass: ${{ steps.constraints.outputs.pass }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: P1 - Context Index Check
        run: |
          echo "🔍 Checking agentic context..."
          test -f .agents/skills_index.json || echo "⚠️  No skills index found"
          test -f .agents/workflows.json && echo "✅ Workflows indexed" || echo "⚠️  No workflows index"

      - name: P2 - Constraints Gate
        id: constraints
        run: |
          echo "🛡️  Running constraints check..."
          cargo run -- workflow constraints-check --json || true
          cargo clippy -- -D warnings
          cargo fmt -- --check
          echo "pass=true" >> "$GITHUB_OUTPUT"

      - name: P3 - Verification Loop
        id: eval
        run: |
          echo "🔄 Running harness eval loop..."
          cargo run -- workflow eval-loop --min-pass 0.9 --max-iterations 3 --json
          echo "pass=true" >> "$GITHUB_OUTPUT"

      - name: P3 - Test Suite
        run: |
          cargo test --lib
          cargo test --bin agentic-sdlc

  # P4: Orchestration - PR Creation
  harness-pr:
    needs: harness-gates
    if: ${{ needs.harness-gates.outputs.eval_pass == 'true' && needs.harness-gates.outputs.constraints_pass == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      pr_url: ${{ steps.pr.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo
        run: cargo build --release

      - name: P4 - Create PR via Harness
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_OWNER: ${{ github.repository_owner }}
          GIT_REPO: ${{ github.event.repository.name }}
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "🚀 Orchestrating PR for branch: $BRANCH"
          ./target/release/agentic-sdlc workflow git-pr-flow \
            "$BRANCH" \
            --base "${{ github.event.inputs.target_branch || 'main' }}" \
            --title "Harness Auto-PR: $BRANCH" \
            --body "Auto-generated by agentic-sdlc harness orchestration (eval_pass=${{ needs.harness-gates.outputs.eval_pass }}, constraints_pass=${{ needs.harness-gates.outputs.constraints_pass }})" \
            --no-merge
          # Extract PR number from gh CLI fallback
          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url' || echo "")
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' || echo "")
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ PR created: $PR_URL"

  # P4: Auto-merge (if enabled)
  harness-merge:
    needs: [harness-gates, harness-pr]
    if: ${{ github.event.inputs.auto_merge == 'true' && needs.harness-pr.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CI on PR
        run: |
          echo "⏳ Waiting for PR #${{ needs.harness-pr.outputs.pr_number }} CI checks..."
          gh pr checks "${{ needs.harness-pr.outputs.pr_number }}" --watch --interval 30 || true

      - name: P4 - Auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔀 Auto-merging PR #${{ needs.harness-pr.outputs.pr_number }}..."
          gh pr merge "${{ needs.harness-pr.outputs.pr_number }}" --squash --auto || \
            gh pr merge "${{ needs.harness-pr.outputs.pr_number }}" --squash
          echo "✅ Merged!"

  # Notification: Human-in-the-loop fallback
  harness-notify:
    needs: harness-pr
    if: ${{ always() && needs.harness-pr.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify (Slack placeholder)
        run: |
          echo "📢 Harness PR ready for review: ${{ needs.harness-pr.outputs.pr_url }}"
          echo "    Eval: ${{ needs.harness-gates.outputs.eval_pass }}"
          echo "    Constraints: ${{ needs.harness-gates.outputs.constraints_pass }}"
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Harness PR ready: ${{ needs.harness-pr.outputs.pr_url }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
