version: '3.8'
services:
  neo4j:
    image: neo4j:5.26
    ports:
      - '7687:7687'
      - '7474:7474'
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data

  kb-server:
    build: .
    ports:
      - '4000:4000'
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PORT: '4000'
    depends_on:
      - neo4j

volumes:
  neo4j_data:
