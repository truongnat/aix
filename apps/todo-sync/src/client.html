<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Todo Sync</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    input {
      width: 70%;
      padding: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      padding: 8px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete-btn {
      background-color: #ff4d4d;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Real-time Todo Sync</h2>
  <div style="display: flex; gap: 8px;">
    <input type="text" id="todo-input" placeholder="Nhập việc cần làm...">
    <button id="add-btn">Thêm</button>
  </div>
  <ul id="todo-list"></ul>

  <script type="module">
    import { TodoClient } from './client.js';

    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');

    // Khởi tạo client WebSocket kết nối tới server local
    const client = new TodoClient('ws://localhost:4000', (event) => {
      if (event.type === 'ADD_TODO') {
        renderTodo(event.payload.id, event.payload.text);
      } else if (event.type === 'DELETE_TODO') {
        const item = document.getElementById(`todo-${event.payload.id}`);
        if (item) item.remove();
      }
    });

    function renderTodo(id, text) {
      const li = document.createElement('li');
      li.id = `todo-${id}`;
      li.innerHTML = `
        <span>${text}</span>
        <button class="delete-btn">Xoá</button>
      `;
      li.querySelector('.delete-btn').addEventListener('click', () => {
        li.remove();
        client.deleteTodo(id);
      });
      todoList.appendChild(li);
    }

    addBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      const id = Date.now();
      renderTodo(id, text);
      client.addTodo(id, text);
      input.value = '';
    });
  </script>
</body>
</html>
