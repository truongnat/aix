# Agentic SDLC Architecture Constraints
# Phase 2: Constraints & Guardrails

version: "1.0"

rules:
  # Rule 3.2: No DB in API layer
  - id: "3.2"
    name: "No DB in API"
    description: "API layer must not directly access database - use repository pattern"
    severity: error
    pattern: '(rusqlite|tokio_postgres|sqlx|Connection::|\.query\(|\.execute\()'
    allowed_paths:
      - "repository"
      - "db"
      - "data"
    forbidden_paths:
      - "api"
      - "handler"
      - "controller"
      - "route"
      - "endpoint"

  # Rule: Feature Isolation
  - id: "FI-001"
    name: "Feature Isolation"
    description: "Feature modules must be isolated from each other"
    severity: error
    pattern: "use crate::feature::"
    allowed_paths: []
    forbidden_paths: []

  # Rule: Repository Pattern
  - id: "RP-001"
    name: "Repository Pattern"
    description: "Direct DB operations must be in repository layer"
    severity: warning
    pattern: '(\.query_row|\.execute|Connection::open)'
    allowed_paths:
      - "repository"
      - "db"
    forbidden_paths:
      - "api"
      - "service"

security:
  internet_skills:
    require_approval: true
    allowed_domains:
      - "api.openai.com"
      - "api.anthropic.com"
      - "api.github.com"
      - "gitlab.com"
    blocked_domains:
      - "localhost:22"
      - "127.0.0.1:22"
      - "0.0.0.0"

  db_isolation:
    no_db_in_api: true
    feature_isolation: true
    require_repository_pattern: true
