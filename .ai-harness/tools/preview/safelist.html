<!--
  Class vocabulary for the preview design system.
  Tailwind scans this file at build time so every class here is guaranteed to
  exist in the offline tailwind.css, even though agent-generated HTML composes
  these classes dynamically at runtime. Keep this in sync with design-guide.md.
  This file is never served; it only feeds the Tailwind build.
-->
<div class="min-h-screen antialiased">
  <!-- layout -->
  <div class="mx-auto container max-w-xs max-w-sm max-w-md max-w-lg max-w-xl max-w-2xl max-w-3xl max-w-4xl max-w-5xl max-w-6xl w-full"></div>
  <div class="flex inline-flex flex-col flex-row flex-wrap items-start items-center items-end justify-start justify-center justify-between flex-1 shrink-0"></div>
  <div class="grid grid-cols-1 grid-cols-2 grid-cols-3 grid-cols-4 md:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 lg:grid-cols-4"></div>
  <div class="gap-1 gap-2 gap-3 gap-4 gap-5 gap-6 gap-8 space-y-1 space-y-2 space-y-3 space-y-4 space-y-6 space-x-2 space-x-3 space-x-4"></div>
  <div class="hidden block inline-block relative absolute overflow-hidden overflow-auto"></div>

  <!-- spacing -->
  <div class="p-2 p-3 p-4 p-5 p-6 p-8 px-2 px-2.5 px-3 px-4 px-5 px-6 px-8 py-0.5 py-1 py-1.5 py-2 py-2.5 py-3 py-4 py-6 py-8 py-12 pt-2 pb-2 mt-2 mt-4 mt-5 mt-6 mt-8 mt-10 mb-2 mb-3 mb-6 mb-8 w-1.5 w-2 w-2.5 h-1.5 h-2 h-2.5 gap-1.5"></div>

  <!-- typography -->
  <div class="text-xs text-sm text-base text-lg text-xl text-2xl text-3xl text-4xl"></div>
  <div class="font-normal font-medium font-semibold font-bold tracking-tight tracking-tighter tracking-wide leading-none leading-snug leading-relaxed uppercase text-left text-center text-right"></div>
  <div class="text-stone-400 text-stone-500 text-stone-600 text-stone-700 text-stone-900 text-white text-emerald-600 text-emerald-800 text-red-600 text-red-700 text-amber-600 text-sky-600"></div>

  <!-- backgrounds -->
  <div class="bg-white bg-stone-50 bg-stone-100 bg-stone-900 bg-emerald-50 bg-emerald-100 bg-red-50 bg-amber-50 bg-sky-50 hover:bg-stone-100 hover:bg-stone-700"></div>

  <!-- borders + radius + ring -->
  <div class="border border-2 border-stone-200 border-stone-300 border-stone-900 border-emerald-200 border-red-200 rounded rounded-md rounded-lg rounded-xl rounded-2xl rounded-3xl rounded-full ring-1 ring-2 ring-stone-900/10 ring-stone-900/5 ring-black/5 ring-black/10 ring-emerald-600/20 hover:border-stone-300 hover:ring-stone-900/10"></div>

  <!-- effects: elevation, motion, glass -->
  <div class="shadow-sm shadow shadow-md shadow-lg shadow-xl shadow-2xl transition transition-all transition-colors transition-shadow transition-transform duration-150 duration-200 duration-300 ease-out cursor-pointer"></div>
  <div class="scale-100 scale-95 hover:scale-100 hover:scale-[1.01] active:scale-95 active:scale-100 -translate-y-0.5 -translate-y-1 hover:-translate-y-0.5 hover:-translate-y-1 hover:shadow-md hover:shadow-lg hover:shadow-xl group"></div>
  <!-- dividers (use border-b for list rows; ring/shadow for card elevation, not border) -->
  <div class="border-t border-b border-stone-100 border-stone-200 divide-y divide-stone-100"></div>
  <div class="bg-black/5 bg-white/30 bg-white/40 bg-white/50 bg-white/60 bg-white/70 bg-white/80 backdrop-blur-sm backdrop-blur-md backdrop-blur-lg backdrop-blur-xl backdrop-blur-2xl"></div>
  <div class="bg-gradient-to-b bg-gradient-to-r bg-gradient-to-br from-stone-50 from-stone-900 via-stone-800 to-white to-stone-700 to-stone-100"></div>
  <div class="ring-white/40 ring-white/50 ring-white/60 ring-white/70"></div>

  <!-- liquid glass: ambient blobs behind frosted panels -->
  <div class="fixed sticky inset-0 -z-10 z-0 z-10 overflow-x-hidden"></div>
  <div class="-top-20 -left-20 -right-20 -bottom-20 top-1/3 right-1/4 left-1/3 h-64 w-64 h-72 w-72 blur-2xl blur-3xl"></div>
  <div class="bg-emerald-100/40 bg-emerald-200/40 bg-sky-100/40 bg-sky-200/40 bg-amber-100/40 bg-amber-200/40 bg-violet-100/40 bg-violet-200/40"></div>

  <!-- tables -->
  <table class="w-full text-left border-collapse"><thead><tr><th class="border-b px-3 py-2"></th></tr></thead><tbody><tr><td class="border-b px-3 py-2"></td></tr></tbody></table>

  <!-- code/pre -->
  <pre class="rounded bg-stone-100 p-3 text-sm font-mono overflow-auto"></pre>
</div>
